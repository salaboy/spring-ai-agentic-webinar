services:
  shipping:
    image: ghcr.io/salaboy/springai-webinar-shipping:latest
    container_name: shipping
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9091:9091"
    environment:
      - KAFKA_BROKERS=kafka:9093
      - KAFKA_TOPIC=shipments
      #- OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://ingress.eu-west-1.aws.dash0-dev.com
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer ${OTEL_EXPORTER_OTLP_TOKEN},Dash0-Dataset=spring-ai-webinar
      - OTEL_SERVICE_NAME=shipping
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_PROPAGATORS=tracecontext,baggage
    depends_on:
      - kafka
    restart: on-failure

  postgres:
    image: library/postgres:17-alpine
    container_name: reshapr-postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "54321:5432"
    volumes:
      - "~/tmp/reshapr-data:/var/lib/postgresql/data/pgdata"
    environment:
      - POSTGRES_USER=reshapr
      - POSTGRES_PASSWORD=reshapr
      - POSTGRES_DB=reshapr
      - PGDATA=/var/lib/postgresql/data/pgdata

  control-plane:
    image: registry.reshapr.io/reshapr/reshapr-ctrl:nightly
    container_name: reshapr-control-plane
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    restart: on-failure
    ports:
      - "5555:5555"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/reshapr
      - QUARKUS_DATASOURCE_USERNAME=reshapr
      - QUARKUS_DATASOURCE_PASSWORD=reshapr
      - RESHAPR_ADMIN_NAME=admin
      - RESHAPR_ADMIN_PASSWORD=password
      - RESHAPR_ADMIN_EMAIL=reshapr@example.com
      - RESHAPR_DEFAULT_GATEWAY_TOKENS=my-super-secret-token-xyz
      - QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=https://ingress.eu-west-1.aws.dash0-dev.com
      - QUARKUS_OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer ${OTEL_EXPORTER_OTLP_TOKEN},Dash0-Dataset=spring-ai-webinar
      - QUARKUS_OTEL_TRACES_EXPORTER=otlp
      - QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - QUARKUS_OTEL_PROPAGATORS=tracecontext,baggage
      # Enable debug logging for the control plane to help with troubleshooting
      #- QUARKUS_LOG_CONSOLE_LEVEL=DEBUG
      #- QUARKUS_LOG_CATEGORY__IO_RESHAPR_CTRL__LEVEL=DEBUG
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5555/q/health/ready" ]
      start_period: 3s
      interval: 2s
      timeout: 2s
      retries: 3

  gateway-01:
    image: registry.reshapr.io/reshapr/reshapr-proxy:nightly
    container_name: reshapr-gateway-01
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      control-plane:
        condition: service_healthy
    restart: on-failure
    ports:
      - "7777:7777"
    environment:
      - RESHAPR_CTRL_HOST=control-plane
      - RESHAPR_CTRL_PORT=5555
      # Note: this token must match one of the tokens defined in RESHAPR_DEFAULT_GATEWAY_TOKENS in the control-plane
      # with the prefix "reshapr-" (e.g. the default organization this gateway is attached)
      - RESHAPR_CTRL_TOKEN=reshapr-my-super-secret-token-xyz
      # Enable debug logging for the proxy to help with troubleshooting
      #- QUARKUS_LOG_CONSOLE_LEVEL=DEBUG
      #- QUARKUS_LOG_CATEGORY__IO_RESHAPR_PROXY__LEVEL=DEBUG
      # Configure the connectiong to the OpenTelemetry Collector running on the host machine
      #- QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=https://ingress.eu-west-1.aws.dash0-dev.com
      - QUARKUS_OTEL_EXPORTER_OTLP_HEADERS=Authorization=Bearer ${OTEL_EXPORTER_OTLP_TOKEN},Dash0-Dataset=spring-ai-webinar
      - QUARKUS_OTEL_TRACES_EXPORTER=otlp
      - QUARKUS_OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - QUARKUS_OTEL_PROPAGATORS=tracecontext,baggage
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7777/q/health/ready" ]
      start_period: 3s
      interval: 2s
      timeout: 2s
      retries: 3
