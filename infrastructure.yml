services:
  jaeger:
    image: jaegertracing/jaeger
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
    # OTLP receivers stay on container ports 4317/4318 but are no longer
    # exposed to the host — the otel-collector fan-outs traces to Jaeger
    # over the docker network.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC ingest (host → collector)
      - "4318:4318" # OTLP HTTP ingest (host → collector)
    environment:
      - DASH0_OTLP_ENDPOINT=${DASH0_OTLP_ENDPOINT}
      - DASH0_AUTH_TOKEN=${DASH0_AUTH_TOKEN}
      - DASH0_DATASET=${DASH0_DATASET:-default}
    depends_on:
      - jaeger
      - kafka
    restart: on-failure

  kafka:
    image: apache/kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "19092:19092"
    command: [
      "sh", "-c",
      "export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,BROKER://kafka:9093,TC-0://kafka:19092 && /etc/kafka/docker/run"
    ]
    volumes:
      - ./agent/opentelemetry-javaagent.jar:/opt/otel/opentelemetry-javaagent.jar:ro
    environment:
      - CLUSTER_ID=kafka-cluster
      - KAFKA_NODE_ID=1
      - KAFKA_INTER_BROKER_LISTENER_NAME=BROKER
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LISTENERS=TC-0://kafka:19092,PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094,BROKER://0.0.0.0:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=BROKER:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,TC-0:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,BROKER://kafka:9093,TC-0://kafka:19092
      # OpenTelemetry Java Agent — exports JVM + Kafka-broker JMX metrics
      # (and any trace instrumentation the agent provides) to the collector.
      - KAFKA_OPTS=-javaagent:/opt/otel/opentelemetry-javaagent.jar
      - OTEL_SERVICE_NAME=kafka
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=30000
      - OTEL_LOGS_EXPORTER=none
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_PROPAGATORS=tracecontext,baggage
      - OTEL_RESOURCE_ATTRIBUTES=service.name=kafka,deployment.environment=dev
      # Enable the JMX Metric Insight extension to scrape Kafka broker MBeans
      # (request handler latency, ISR shrink rate, controller state, etc.).
      - OTEL_JMX_TARGET_SYSTEM=kafka-broker
