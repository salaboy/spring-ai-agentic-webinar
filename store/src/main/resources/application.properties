spring.application.name=store
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}

#spring.ai.chat.observations.log-prompt=true
#spring.ai.chat.observations.log-completion=true
#spring.ai.chat.observations.include-error-logging=true
#spring.ai.chat.client.observations.log-prompt=true
#spring.ai.chat.client.observations.log-completion=true
#spring.ai.tools.observations.include-content=true

arconia.observations.conventions.opentelemetry.ai.capture-content=span-attributes
arconia.observations.conventions.opentelemetry.ai.include-tool-definitions=true
arconia.observations.conventions.opentelemetry.ai.include-tool-call-content=true


arconia.observations.conventions.opentelemetry.ai.flavor=opentelemetry

#management.tracing.propagation.type=W3C,B3
#management.tracing.sampling.probability=1.0
#management.endpoints.web.exposure.include=*


store.events.topic=shipments
store.events.group-id=store-events

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.store.model.Event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

#shipping-mcp.baseUrl=http://localhost:7777
#shipping-mcp.endpoint=mcp/reshapr/springio.workshop.v1.ShippingService/v1

spring.ai.mcp.client.streamable-http.connections.shipping-mcp.url=http://localhost:7777
spring.ai.mcp.client.streamable-http.connections.shipping-mcp.endpoint=/mcp/reshapr/springio.workshop.v1.ShippingService/v1

