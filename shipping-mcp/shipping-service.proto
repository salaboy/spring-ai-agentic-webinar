syntax = "proto3";

import "google/protobuf/timestamp.proto";

option go_package = "github.com/spring-io-2026-workshop/shipping/gen/shippingpb";

package springio.workshop.v1;

message ShipOrderRequest {
    string order_id = 1;
    Address shipping_address = 2;
}

message Address {
    string customer_id = 1;
    string city = 2;
    string country = 3;
}

message ShipOrderResponse {
    string shipment_id = 1;
    google.protobuf.Timestamp shipment_date = 2;
    google.protobuf.Timestamp estimated_delivery_date = 3;
    ShipmentStatus status = 4;
}

enum ShipmentStatus {
    PENDING = 0;
    SHIPPED = 1;
    DELIVERED = 2;
}

message ShippingDelayRequest {}

message ShippingDelayResponse {
    string message = 1;
    int32 delay_seconds = 2;
}

message ShippingFailureRequest {}

message ShippingFailureResponse {
    string message = 1;
}

// ShippingService provides operations for shipping orders.
service ShippingService {
    // ShipOrder processes the shipping of an order and returns the shipment details.
    rpc ShipOrder(ShipOrderRequest) returns (ShipOrderResponse);

    // ShippingDelay simulates a slow shipping operation by sleeping for 10 seconds before returning.
    rpc ShippingDelay(ShippingDelayRequest) returns (ShippingDelayResponse);

    // ShippingFailure simulates a server-side failure by returning a gRPC INTERNAL error (analogous to HTTP 500).
    rpc ShippingFailure(ShippingFailureRequest) returns (ShippingFailureResponse);
}

